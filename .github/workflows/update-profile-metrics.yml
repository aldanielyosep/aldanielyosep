name: Update Profile Metrics

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Waka Readme"]
    types:
      - completed

permissions:
  contents: write

jobs:
  update-metrics:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Build contribution metrics and update README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');

            const query = `
              query ($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    totalCommitContributions
                    totalPullRequestContributions
                    totalPullRequestReviewContributions
                    restrictedContributionsCount
                  }
                }
              }
            `;

            const login = context.repo.owner;
            const now = new Date();
            const startYear = 2008;

            const totals = {
              commits: 0,
              prs: 0,
              reviews: 0,
              restricted: 0
            };

            for (let year = startYear; year <= now.getUTCFullYear(); year++) {
              const from = new Date(Date.UTC(year, 0, 1, 0, 0, 0)).toISOString();
              const toDate = year === now.getUTCFullYear()
                ? now
                : new Date(Date.UTC(year, 11, 31, 23, 59, 59));
              const to = toDate.toISOString();

              const result = await github.graphql(query, { login, from, to });
              if (!result.user) {
                continue;
              }

              const metrics = result.user.contributionsCollection;
              totals.commits += metrics.totalCommitContributions;
              totals.prs += metrics.totalPullRequestContributions;
              totals.reviews += metrics.totalPullRequestReviewContributions;
              totals.restricted += metrics.restrictedContributionsCount;
            }

            const updatedDate = new Date().toISOString().slice(0, 10);

            const block = [
              '```txt',
              `Commits: ${totals.commits}`,
              `Pull Requests: ${totals.prs}`,
              `Code Reviews: ${totals.reviews}`,
              `Restricted Private Contributions: ${totals.restricted}`,
              `Last Updated: ${updatedDate}`,
              '```'
            ].join('\n');

            const startMarker = '<!--START_SECTION:profile-metrics-->';
            const endMarker = '<!--END_SECTION:profile-metrics-->';
            const readmePath = 'README.md';
            const readme = fs.readFileSync(readmePath, 'utf8');

            const markerPattern = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`, 'm');
            if (!markerPattern.test(readme)) {
              core.setFailed('README markers for profile metrics were not found.');
              return;
            }

            const replacement = `${startMarker}\n\n${block}\n\n${endMarker}`;
            const updatedReadme = readme.replace(markerPattern, replacement);

            fs.writeFileSync(readmePath, updatedReadme, 'utf8');

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git add README.md
            git commit -m "chore: update profile metrics"
            git push
          else
            echo "No README changes to commit"
          fi
