name: Update Profile Metrics

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 12:00 PM
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Build contribution metrics and update README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');

            const query = `
              query ($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    totalCommitContributions
                    totalPullRequestContributions
                    totalPullRequestReviewContributions
                    restrictedContributionsCount
                  }
                }
              }
            `;

            const reviewSearchQuery = `
              query (
                $qAuthoredPrs: String!
                $qReviewedPrs: String!
                $qApproved: String!
                $qCommented: String!
              ) {
                authored: search(query: $qAuthoredPrs, type: ISSUE) {
                  issueCount
                }
                reviewed: search(query: $qReviewedPrs, type: ISSUE) {
                  issueCount
                }
                approved: search(query: $qApproved, type: ISSUE) {
                  issueCount
                }
                commented: search(query: $qCommented, type: ISSUE) {
                  issueCount
                }
              }
            `;

            const login = context.repo.owner;
            const now = new Date();
            const startYear = 2008;

            const totals = {
              commits: 0,
              prs: 0,
              reviews: 0,
              restricted: 0
            };

            for (let year = startYear; year <= now.getUTCFullYear(); year++) {
              const from = new Date(Date.UTC(year, 0, 1, 0, 0, 0)).toISOString();
              const toDate = year === now.getUTCFullYear()
                ? now
                : new Date(Date.UTC(year, 11, 31, 23, 59, 59));
              const to = toDate.toISOString();

              const result = await github.graphql(query, { login, from, to });
              if (!result.user) {
                continue;
              }

              const metrics = result.user.contributionsCollection;
              totals.restricted += metrics.restrictedContributionsCount;
            }

            const reviewSearch = await github.graphql(reviewSearchQuery, {
              qAuthoredPrs: `type:pr author:${login}`,
              qReviewedPrs: `type:pr reviewed-by:${login}`,
              qApproved: `type:pr reviewed-by:${login} review:approved`,
              qCommented: `type:pr reviewed-by:${login} review:commented`
            });

            const commitSearch = await github.request('GET /search/commits', {
              q: `author:${login}`,
              per_page: 1,
              headers: {
                accept: 'application/vnd.github.cloak-preview+json'
              }
            });
            totals.commits = commitSearch.data.total_count;
            totals.prs = reviewSearch.authored.issueCount;
            totals.reviews = reviewSearch.reviewed.issueCount;

            const reviewStats = {
              approved: reviewSearch.approved.issueCount,
              commented: reviewSearch.commented.issueCount
            };

            const updatedDate = new Date().toISOString().slice(0, 10);

            const block = [
              '```txt',
              `🧾 Commits Authored (All Accessible Repos, All-time): ${totals.commits}`,
              `🔀 Pull Requests Authored (All Accessible Repos, All-time): ${totals.prs}`,
              `👀 Code Reviews (PRs Reviewed, All Accessible Repos, All-time): ${totals.reviews}`,
              `✅ Approved Reviews (PRs, All Accessible Repos, All-time): ${reviewStats.approved}`,
              `💬 Commented Reviews (PRs, All Accessible Repos, All-time): ${reviewStats.commented}`,
              `🔒 Restricted Private Contributions (All-time): ${totals.restricted}`,
              `🗓 Last Updated: ${updatedDate}`,
              '```'
            ].join('\n');

            const startMarker = '<!--START_SECTION:profile-metrics-->';
            const endMarker = '<!--END_SECTION:profile-metrics-->';
            const readmePath = 'README.md';
            const readme = fs.readFileSync(readmePath, 'utf8');

            const markerPattern = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`, 'm');
            if (!markerPattern.test(readme)) {
              core.setFailed('README markers for profile metrics were not found.');
              return;
            }

            const replacement = `${startMarker}\n\n${block}\n\n${endMarker}`;
            const updatedReadme = readme.replace(markerPattern, replacement);

            fs.writeFileSync(readmePath, updatedReadme, 'utf8');

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git add README.md
            git commit -m "chore: update profile metrics"
            git push
          else
            echo "No README changes to commit"
          fi
